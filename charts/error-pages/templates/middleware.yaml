apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Values.middleware.name }}
  namespace: {{ .Release.Namespace }}
spec:
  errors:
    status:
      - '400-599'
    query: '/{status}.html'
    service:
      name: {{ include "error-pages.fullname" . }}
      port: {{ .Values.service.port }}
