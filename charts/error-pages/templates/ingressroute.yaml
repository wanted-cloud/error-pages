apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "error-pages.fullname" . }}-catch-all
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    {{- toYaml .Values.ingressRoute.entryPoints | nindent 4 }}
  routes:
    - kind: Rule
      match: PathPrefix("/")
      priority: {{ .Values.ingressRoute.priority }}
      services:
        - name: {{ include "error-pages.fullname" . }}
          port: {{ .Values.service.port }}
