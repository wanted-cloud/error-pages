replicaCount: 1

image:
  repository: ghcr.io/wanted-cloud/error-pages
  tag: '0.2.0'
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 100m
    memory: 32Mi

middleware:
  name: error-pages

ingressRoute:
  entryPoints:
    - web
    - websecure
  priority: 1
