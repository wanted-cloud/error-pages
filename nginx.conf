server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;

    # Prevent nginx from including the internal pod port (8080) in redirect URLs.
    absolute_redirect off;

    # Serve static files directly.
    # Traefik's errors middleware sends /{status}.html — matched as exact files.
    # Unknown paths fall through to the 404 error page (internal, no redirect).
    # CSR is disabled so there is no SvelteKit router to confuse with the URL.
    location / {
        try_files $uri =404;
    }

    error_page 404 /404.html;

    # Disable server version disclosure.
    server_tokens off;

    # Security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: https://wanted.solutions;" always;

    # Disable directory listing.
    autoindex off;
}
