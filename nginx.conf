server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files directly.
    # Traefik's errors middleware sends /{status}.html — these are flat files
    # at the root of the build output, so no rewrite is needed.
    location / {
        try_files $uri $uri/ =404;
    }

    # 404 fallback — serve the prerendered 404 error page for any unmatched path.
    error_page 404 /404.html;

    # Disable server version disclosure.
    server_tokens off;

    # Security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;

    # Disable directory listing.
    autoindex off;
}
