server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;

    # Prevent nginx from including the internal pod port (8080) in redirect URLs.
    absolute_redirect off;

    # Serve static files directly.
    # Traefik's errors middleware sends /{status}.html — matched as exact files.
    # Any unmatched path redirects to /404.html so the browser URL matches the
    # prerendered SvelteKit route and client-side hydration works correctly.
    location / {
        try_files $uri @fallback;
    }

    location @fallback {
        return 302 /404.html;
    }

    # Disable server version disclosure.
    server_tokens off;

    # Security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;

    # Disable directory listing.
    autoindex off;
}
